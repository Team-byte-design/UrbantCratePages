<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP AI - Account Deletion</title>
    <style>
        :root {
            --primary-color: #8A2BE2; /* BlueViolet */
            --primary-dark: #6a1b9a;
            --bg-color: #f4ecfb;
            --text-color: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--white);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.12);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .description {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
            line-height: 1.6;
            text-align: left;
        }

        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
            font-size: 14px;
        }

        input[type="tel"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0d4ec;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background-color: #faf8fc;
        }

        input[type="tel"]:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(138, 43, 226, 0.1);
        }

        button {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 15px 20px;
            width: 100%;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(106, 27, 154, 0.2);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background-color: #c4a1e9;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-weight: 500;
            font-size: 15px;
            line-height: 1.5;
            text-align: left;
        }

        .message-box.success {
            display: block;
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .message-box.error {
            display: block;
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .loader {
            display: none;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid var(--white);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-text {
            display: inline-block;
        }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">VIP AI</div>
        <div class="subtitle">Account Deletion Request</div>
        
        <p class="description">
            To request the permanent deletion of your VIP AI account and all associated personal data from our systems, please submit your registered phone number.
        </p>

        <form id="deletionForm">
            <div class="form-group">
                <label for="phone">Registered Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter 10-digit phone number" pattern="[0-9]{10}" maxlength="10" required>
            </div>
            
            <button type="submit" id="submitBtn">
                <span class="btn-text">Submit Deletion Request</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <div id="responseMessage" class="message-box"></div>
        
        <div class="footer">
            &copy; <script>document.write(new Date().getFullYear())</script> VIP AI. All rights reserved.
        </div>
    </div>

    <script>
        document.getElementById('deletionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const phoneInput = document.getElementById('phone').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.querySelector('.btn-text');
            const loader = document.getElementById('loader');
            const responseMessage = document.getElementById('responseMessage');

            // Basic validation
            if (!/^\d{10}$/.test(phoneInput)) {
                showMessage('Please enter a valid 10-digit phone number.', 'error');
                return;
            }

            // Loading state
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            responseMessage.className = 'message-box'; // reset

            const payload = {
                phone: phoneInput,
                appId: "customer"
            };

            try {
                const response = await fetch('https://project-urbancrate-api.onrender.com/api/v1/auth/account-deletion-request', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showMessage(data.message || 'Account deletion request received successfully.', 'success');
                    document.getElementById('deletionForm').reset();
                } else {
                    showMessage(data.message || 'Failed to submit request. Please try again.', 'error');
                }
            } catch (error) {
                showMessage('An error occurred while sending the request. Please check your connection and try again.', 'error');
            } finally {
                // Reset styling
                submitBtn.disabled = false;
                btnText.style.display = 'inline-block';
                loader.style.display = 'none';
            }
        });

        function showMessage(msg, type) {
            const responseMessage = document.getElementById('responseMessage');
            responseMessage.textContent = msg;
            responseMessage.className = 'message-box ' + type;
        }
    </script>
</body>
</html>
